<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/3d-print/vite.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de precios Arman3D</title>
    <script type="module" crossorigin src="/3d-print/assets/index-DqrReivu.js"></script>
    <link rel="stylesheet" crossorigin href="/3d-print/assets/index-D2lL8KLx.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          })
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) +
            decoded[0] +
            (decoded[1] ? '&' + decoded[1] : '') +
            l.hash
          )
        }
      }(window.location))
    </script>
  </body>
</html>
